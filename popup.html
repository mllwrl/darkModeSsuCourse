<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 180px;
            background: #1e1e1e;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 15px;
            margin: 0;
        }

        .title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #8ab4f8;
        }

        .theme-btn {
            background: #2d2d2d;
            border: 2px solid #333;
            color: #ddd;
            padding: 10px;
            margin-bottom: 8px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .theme-btn:hover {
            background: #3d3d3d;
        }

        /* Стили для активной кнопки */
        .theme-btn.active {
            border-color: #8ab4f8;
            background: #253347;
            color: #8ab4f8;
        }

        .theme-btn[data-theme="dracula"].active {
            border-color: #ff79c6;
            background: #44475a;
            color: #ff79c6;
        }
    </style>
</head>

<body>
    <div class="title">Выбор темы SSU</div>

    <button class="theme-btn" data-theme="none">Светлая (Off)</button>
    <button class="theme-btn" data-theme="dark">Темная</button>
    <button class="theme-btn" data-theme="dracula">Dracula</button>

    <script src="popup.js"></script>
</body>

</html>
